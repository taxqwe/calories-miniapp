<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Метаболизм</title>
  <link rel="stylesheet" href="style.css">
  <!-- Telegram WebApp API -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div class="page" id="page">

    <!-- ── Шапка ── -->
    <header class="page__header">
      <button type="button" class="hdr-back" id="back-btn" hidden>
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15.5 5.5a1 1 0 0 1 0 1.4L11.4 11l4.1 4.1a1 1 0 1 1-1.4 1.4l-4.8-4.8a1 1 0 0 1 0-1.4l4.8-4.8a1 1 0 0 1 1.4 0z"/></svg>
        <span id="back-label"></span>
      </button>
      <h1 class="page__title" id="page-title"></h1>
      <p class="page__subtitle" id="page-subtitle"></p>
    </header>

    <!-- ── Онбординг-баннер (только первичный расчёт) ── -->
    <div class="onb-guide" id="onb-guide" hidden>
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
      <p id="onb-guide-text"></p>
    </div>

    <!-- ── Hero: целевые калории + базовый обмен ── -->
    <section class="metab-hero" id="metab-hero">
      <div class="metab-hero__label" id="hero-label"></div>
      <div class="metab-hero__value">
        <span id="hero-value">—</span><span class="unit" id="hero-unit"></span>
      </div>
      <div class="metab-hero__meta" id="hero-meta"></div>
    </section>

    <form id="bmr-form" novalidate>

      <!-- ── Данные тела ── -->
      <section class="card">
        <h2 class="card__title" id="body-section-title"></h2>
        <div class="metab-rows">
          <label class="metab-field">
            <span class="metab-field__label" id="label-height"></span>
            <input class="metab-field__input" type="text" id="height" name="height"
              inputmode="numeric" autocomplete="off" enterkeyhint="next" placeholder="">
          </label>
          <label class="metab-field">
            <span class="metab-field__label" id="label-weight"></span>
            <input class="metab-field__input" type="text" id="weight" name="weight"
              inputmode="numeric" autocomplete="off" enterkeyhint="next" placeholder="">
          </label>
          <label class="metab-field">
            <span class="metab-field__label" id="label-age"></span>
            <input class="metab-field__input" type="text" id="age" name="age"
              inputmode="numeric" autocomplete="off" enterkeyhint="done" placeholder="">
          </label>
        </div>
        <div class="segmented" id="gender-seg" role="group">
          <button type="button" class="segmented__item" id="gender-male" data-value="m"></button>
          <button type="button" class="segmented__item" id="gender-female" data-value="f"></button>
        </div>
      </section>

      <!-- ── Активность ── -->
      <section class="card">
        <h2 class="card__title" id="activity-section-title"></h2>
        <div class="activity-row">
          <span id="activity-row-label"></span>
          <span class="activity-row__level" id="activity-level-name"></span>
        </div>
        <input class="metab-range" type="range" id="activityRange" name="activity" min="1" max="5" step="1" value="3">
        <div class="metab-ticks"><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span></div>
        <div class="activity-note" id="activity-note"></div>
      </section>

      <!-- ── Цель ── -->
      <section class="card" id="goal-card">
        <div class="switch-row">
          <label for="goal-toggle" id="label-goal-toggle"></label>
          <label class="switch">
            <input type="checkbox" id="goal-toggle">
            <span class="switch__slider"></span>
          </label>
        </div>
        <div class="segmented" id="goal-seg" role="group" hidden>
          <button type="button" class="segmented__item" id="goal-deficit" data-value="deficit"></button>
          <button type="button" class="segmented__item" id="goal-surplus" data-value="surplus"></button>
        </div>
      </section>

      <button type="submit" class="metab-cta" id="calculate-button"></button>
      <div class="cta-hint" id="cta-hint"></div>
    </form>

    <div id="result" class="result"></div>
  </div>

  <script src="../config.js"></script>
  <script src="main.js"></script>
</body>
</html>
